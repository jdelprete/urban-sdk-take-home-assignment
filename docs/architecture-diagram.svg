<svg xmlns="http://www.w3.org/2000/svg" width="1700" height="980" viewBox="0 0 1700 980" role="img" aria-labelledby="title desc">
  <title id="title">Urban SDK Traffic Microservice Architecture</title>
  <desc id="desc">Draw.io-style architecture diagram showing source data, ingestion, ORM models, PostgreSQL with PostGIS, FastAPI endpoints, and notebook visualization.</desc>
  <defs>
    <linearGradient id="page" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f7fafc"/>
      <stop offset="100%" stop-color="#edf3f7"/>
    </linearGradient>
    <linearGradient id="banner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#23415d"/>
      <stop offset="100%" stop-color="#406387"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#16324a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L12,6 L0,12 z" fill="#5b7d9d"/>
    </marker>
    <style>
      .header { font: 700 34px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #ffffff; }
      .subheader { font: 500 17px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #5b748d; }
      .lane { font: 700 17px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #39556f; letter-spacing: 0.08em; }
      .boxTitle { font: 700 18px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #18344b; }
      .boxLabel { font: 700 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #627c94; }
      .body { font: 500 12px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #4d677e; }
      .edge { font: 600 11px "Helvetica Neue", Helvetica, Arial, sans-serif; fill: #456788; }
      .frame { fill: #f4f8fb; stroke: #d7e1ea; stroke-width: 2; }
      .source { fill: #ffffff; stroke: #cad5e0; stroke-width: 2; }
      .ingest { fill: #eef6ff; stroke: #78a4d2; stroke-width: 2; }
      .storage { fill: #eef8f0; stroke: #7db28a; stroke-width: 2; }
      .service { fill: #fff6ea; stroke: #d7a45a; stroke-width: 2; }
      .client { fill: #f4efff; stroke: #9978cf; stroke-width: 2; }
      .note { fill: #ffffff; stroke: #d2dde7; stroke-width: 2; stroke-dasharray: 10 7; }
      .connector { fill: none; stroke: #5b7d9d; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1700" height="980" fill="url(#page)"/>
  <rect x="0" y="0" width="1700" height="92" fill="url(#banner)"/>
  <text x="54" y="58" class="header">Urban SDK Traffic Microservice Architecture</text>
  <text x="58" y="138" class="subheader">End-to-end flow from parquet ingestion through PostGIS-backed FastAPI endpoints to notebook visualization</text>

  <text x="86" y="214" class="lane">SOURCE DATA</text>
  <text x="464" y="214" class="lane">INGESTION + MODELS</text>
  <text x="916" y="214" class="lane">DATABASE + API</text>
  <text x="1334" y="214" class="lane">NOTEBOOK + MAP</text>

  <rect x="58" y="236" width="308" height="614" rx="24" class="frame"/>
  <rect x="410" y="236" width="438" height="614" rx="24" class="frame"/>
  <rect x="892" y="236" width="402" height="614" rx="24" class="frame"/>
  <rect x="1338" y="236" width="304" height="614" rx="24" class="frame"/>

  <g filter="url(#shadow)">
    <rect x="84" y="286" width="252" height="132" rx="18" class="source"/>
    <text x="118" y="328" class="boxTitle">link_info.parquet.gz</text>
    <text x="118" y="356" class="boxLabel">Road segment reference data</text>
    <text x="118" y="384" class="body">
      <tspan x="118" dy="0">Road names, length, metadata,</tspan>
      <tspan x="118" dy="18">and source GeoJSON geometry</tspan>
    </text>

    <rect x="84" y="472" width="252" height="132" rx="18" class="source"/>
    <text x="118" y="514" class="boxTitle">duval_jan1_2024.parquet</text>
    <text x="118" y="542" class="boxLabel">Traffic speed observations</text>
    <text x="118" y="570" class="body">
      <tspan x="118" dy="0">Timestamped speeds, freeflow,</tspan>
      <tspan x="118" dy="18">confidence, and percentiles</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="438" y="286" width="382" height="146" rx="18" class="ingest"/>
    <text x="474" y="328" class="boxTitle">Ingestion Script</text>
    <text x="474" y="356" class="boxLabel">scripts/ingest_data.py</text>
    <text x="474" y="386" class="body">
      <tspan x="474" dy="0">Reads parquet files with pandas</tspan>
      <tspan x="474" dy="18">and pyarrow, then prepares rows</tspan>
      <tspan x="474" dy="18">for database loading</tspan>
    </text>

    <rect x="438" y="486" width="382" height="178" rx="18" class="ingest"/>
    <text x="474" y="528" class="boxTitle">SQLAlchemy ORM Models</text>
    <text x="474" y="556" class="boxLabel">Link + SpeedRecord</text>
    <text x="474" y="586" class="body">
      <tspan x="474" dy="0">Declarative models define links,</tspan>
      <tspan x="474" dy="18">timestamps, speeds, confidence,</tspan>
      <tspan x="474" dy="18">and spatial geometry fields.</tspan>
      <tspan x="474" dy="18">Shared sessions come from</tspan>
      <tspan x="474" dy="18">app/db/session.py</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="918" y="286" width="350" height="152" rx="18" class="storage"/>
    <text x="954" y="328" class="boxTitle">PostgreSQL + PostGIS</text>
    <text x="954" y="356" class="boxLabel">Spatial persistence layer</text>
    <text x="954" y="386" class="body">
      <tspan x="954" dy="0">`links` stores road geometry.</tspan>
      <tspan x="954" dy="18">`speed_records` stores indexed</tspan>
      <tspan x="954" dy="18">traffic observations and metrics.</tspan>
    </text>

    <rect x="918" y="492" width="350" height="234" rx="18" class="service"/>
    <text x="954" y="534" class="boxTitle">FastAPI Service</text>
    <text x="954" y="562" class="boxLabel">app/main.py + app/api/routes.py</text>
    <text x="954" y="592" class="body">
      <tspan x="954" dy="0">GET /aggregates/</tspan>
      <tspan x="954" dy="18">GET /aggregates/{link_id}</tspan>
      <tspan x="954" dy="18">GET /patterns/slow_links/</tspan>
      <tspan x="954" dy="18">POST /aggregates/spatial_filter/</tspan>
      <tspan x="954" dy="22">GeoJSON-ready responses for</tspan>
      <tspan x="954" dy="18">notebook-based mapping</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1364" y="304" width="252" height="160" rx="18" class="client"/>
    <text x="1398" y="346" class="boxTitle">Jupyter Notebook</text>
    <text x="1398" y="374" class="boxLabel">requests + pandas + mapboxgl</text>
    <text x="1398" y="404" class="body">
      <tspan x="1398" dy="0">Calls the API with day/period</tspan>
      <tspan x="1398" dy="18">filters and builds a GeoJSON</tspan>
      <tspan x="1398" dy="18">FeatureCollection</tspan>
    </text>

    <rect x="1364" y="534" width="252" height="132" rx="18" class="client"/>
    <text x="1398" y="576" class="boxTitle">Mapbox Visualization</text>
    <text x="1398" y="604" class="boxLabel">Interactive line rendering</text>
    <text x="1398" y="632" class="body">
      <tspan x="1398" dy="0">Colors road segments by</tspan>
      <tspan x="1398" dy="18">aggregated average speed</tspan>
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="430" y="882" width="852" height="78" rx="16" class="note"/>
    <text x="460" y="914" class="body">
      <tspan x="460" dy="0">Testing is split into fast mocked API tests and live database-backed integration tests.</tspan>
      <tspan x="460" dy="18">Notebook credentials are read from the environment rather than committed into source files.</tspan>
    </text>
  </g>

  <path class="connector" d="M336 352 H438"/>
  <rect x="360" y="324" width="70" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="377" y="338" class="edge">metadata</text>

  <path class="connector" d="M336 538 H438"/>
  <rect x="362" y="510" width="76" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="378" y="524" class="edge">speed rows</text>

  <path class="connector" d="M820 359 H918"/>
  <rect x="846" y="331" width="68" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="862" y="345" class="edge">bulk load</text>

  <path class="connector" d="M820 575 H918"/>
  <rect x="840" y="547" width="78" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="854" y="561" class="edge">ORM queries</text>

  <path class="connector" d="M1268 610 C1316 610, 1322 384, 1364 384"/>
  <rect x="1284" y="584" width="62" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="1298" y="598" class="edge">JSON API</text>

  <path class="connector" d="M1490 464 V534"/>
  <rect x="1500" y="492" width="54" height="20" rx="10" fill="#ffffff" stroke="#d7e1ea" stroke-width="1.5"/>
  <text x="1514" y="506" class="edge">render</text>
</svg>
